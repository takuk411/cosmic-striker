<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>COSMIC STRIKER - 横スクロールシューティング</title>
<style>
  /* ===== レイアウト: 800x500 の内部解像度を維持しつつ画面幅に追従 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    overscroll-behavior: none;   /* iOSのバウンス/引っ張り更新を抑止 */
  }
  body {
    background: #05060f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;          /* ページ全体のスクロール/ズームジェスチャを無効化 */
    -webkit-user-select: none;
    user-select: none;
  }
  #game-container {
    position: relative;
    width: min(100vw, 800px);
    padding: 8px;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;            /* アスペクト比 800:500 を維持 */
    background: #05060f;
    border: 1px solid #1c2340;
    border-radius: 4px;
    touch-action: none;
  }

  /* ===== タッチ操作UI（スマホ/タブレットのみ表示） ===== */
  #touch-controls {
    display: none;
    position: absolute;
    left: 8px; right: 8px;
    bottom: 16px;
    pointer-events: none;        /* 子要素のボタンのみ操作可 */
    justify-content: space-between;
    align-items: flex-end;
    z-index: 10;
  }
  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: flex; }
  }
  .tc-btn {
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8,10,25,0.72);
    border: 1px solid #3a4a8f;
    border-radius: 50%;
    color: #9ecbff;
    font: bold 12px monospace;
    -webkit-tap-highlight-color: transparent;
  }
  .tc-btn.active {
    background: rgba(80,110,200,0.55);
    border-color: #9ecbff;
  }
  /* 十字パッド（3x3グリッド、中央は空） */
  #tc-dpad {
    display: grid;
    grid-template-columns: repeat(3, 54px);
    grid-template-rows: repeat(3, 54px);
    gap: 4px;
  }
  #tc-dpad .tc-btn { border-radius: 10px; font-size: 18px; }
  #tc-up    { grid-column: 2; grid-row: 1; }
  #tc-left  { grid-column: 1; grid-row: 2; }
  #tc-right { grid-column: 3; grid-row: 2; }
  #tc-down  { grid-column: 2; grid-row: 3; }
  /* 右側のアクションボタン */
  #tc-actions {
    display: flex;
    align-items: flex-end;
    gap: 14px;
  }
  #tc-missile { width: 56px; height: 56px; font-size: 12px; }
  #tc-shot    { width: 74px; height: 74px; font-size: 14px; }
  /* 右上のポーズボタン */
  #tc-pause {
    display: none;
    position: absolute;
    top: 16px; right: 16px;
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(8,10,25,0.72);
    border: 1px solid #3a4a8f;
    color: #9ecbff;
    font: bold 16px monospace;
    z-index: 11;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: none) and (pointer: coarse) {
    #tc-pause { display: flex; align-items: center; justify-content: center; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="800" height="500"></canvas>

  <button id="tc-pause" aria-label="ポーズ">II</button>

  <div id="touch-controls">
    <div id="tc-dpad">
      <div id="tc-up"    class="tc-btn" data-key="arrowup">▲</div>
      <div id="tc-left"  class="tc-btn" data-key="arrowleft">◀</div>
      <div id="tc-right" class="tc-btn" data-key="arrowright">▶</div>
      <div id="tc-down"  class="tc-btn" data-key="arrowdown">▼</div>
    </div>
    <div id="tc-actions">
      <div id="tc-missile" class="tc-btn" data-key="x">MSL</div>
      <div id="tc-shot"    class="tc-btn" data-key="z">SHOT</div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
 * COSMIC STRIKER
 * 横スクロールシューティング（単一ファイル・外部アセット不使用）
 *
 * 構成:
 *   1. 定数・ユーティリティ
 *   2. 入力管理 (Input)
 *   3. 背景 (Stars / 遠景) - 視差スクロール
 *   4. 地形 (Terrain) - ハイトマップ + 当たり判定
 *   5. エンティティ (Player / 弾 / 敵 / ボス / カプセル / パーティクル)
 *   6. スポナー (敵出現管理)
 *   7. ゲーム本体 (状態機械 + 60fps固定ループ)
 *   8. HUD / 各種画面
 * ============================================================ */

/* ===== 1. 定数・ユーティリティ ===== */
const W = 800, H = 500;          // 内部解像度
const HUD_H = 34;                // 上部HUDバーの高さ
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

const rand    = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const clamp   = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp    = (a, b, t) => a + (b - a) * t;
const dist2   = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
/** 円同士の当たり判定（全エンティティ共通） */
const hitCircle = (a, b) => dist2(a.x, a.y, b.x, b.y) < (a.r + b.r) ** 2;

/* ===== 2. 入力管理 =====
 * down    : 押しっぱなし判定（移動・連射）
 * pressed : 押した瞬間のみ true（決定キーなど、フレーム末尾でクリア）*/
const Input = {
  down: {}, pressed: {},
  init() {
    const watch = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'z', 'x', 'p', 'enter'];
    addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (watch.includes(k)) e.preventDefault();   // 矢印キーでのページスクロールを防止
      if (!e.repeat) this.pressed[k] = true;
      this.down[k] = true;
    });
    addEventListener('keyup', e => { this.down[e.key.toLowerCase()] = false; });
  },
  endFrame() { this.pressed = {}; }
};

/* ===== 2b. タッチ操作 =====
 * 各ボタン要素ごとに touchstart/touchend を張ることで、
 * D-pad と SHOT/MSL の同時押し（マルチタッチ）に対応する。
 * Input.down / Input.pressed に直接反映するので、以降のゲームロジックは
 * キーボードと完全に共通のまま扱える。 */
const TouchControls = {
  init() {
    const btns = document.querySelectorAll('.tc-btn[data-key]');
    btns.forEach(el => {
      const key = el.dataset.key;
      const start = e => {
        e.preventDefault();
        if (!Input.down[key]) Input.pressed[key] = true;
        Input.down[key] = true;
        el.classList.add('active');
      };
      const end = e => {
        e.preventDefault();
        Input.down[key] = false;
        el.classList.remove('active');
      };
      el.addEventListener('touchstart', start, { passive: false });
      el.addEventListener('touchend', end, { passive: false });
      el.addEventListener('touchcancel', end, { passive: false });
      // デスクトップでのマウス操作テスト用（ボタンをクリックしても動く）
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
      el.addEventListener('mouseleave', end);
    });

    const pauseBtn = document.getElementById('tc-pause');
    const togglePause = e => {
      e.preventDefault();
      Input.pressed['p'] = true;
    };
    pauseBtn.addEventListener('touchstart', togglePause, { passive: false });
    pauseBtn.addEventListener('click', togglePause);

    // 画面全体でのピンチズーム/スクロールを念のため抑止
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault());
  }
};

/* ===== 3. 背景: 星3種 + 遠景シルエット（視差レイヤー） ===== */
const Background = {
  stars: [],      // {x,y,size,speed,bright} speed が層の役割（遅い=遠い）
  farHills: [],   // 遠景シルエットのハイトマップ
  farOffset: 0,
  FAR_SEG: 80,

  init() {
    this.stars = [];
    for (let i = 0; i < 90; i++) {
      const layer = randInt(0, 2);                 // 0:遠 1:中 2:近
      this.stars.push({
        x: rand(0, W), y: rand(0, H),
        size: layer * 0.6 + 0.6,
        speed: [0.15, 0.4, 0.9][layer],
        bright: rand(0.3, 1)
      });
    }
    this.farHills = [];
    for (let i = 0; i < Math.ceil(W / this.FAR_SEG) + 2; i++) this.pushHill();
    this.farOffset = 0;
  },
  pushHill() {
    const prev = this.farHills.length ? this.farHills[this.farHills.length - 1] : 120;
    this.farHills.push(clamp(prev + rand(-40, 40), 60, 200));
  },
  update(scroll) {
    // 星: 各層の速度でループスクロール
    for (const s of this.stars) {
      s.x -= scroll * s.speed;
      if (s.x < 0) { s.x += W; s.y = rand(0, H); }
    }
    // 遠景: 0.3倍速でスクロール
    this.farOffset += scroll * 0.3;
    while (this.farOffset >= this.FAR_SEG) {
      this.farOffset -= this.FAR_SEG;
      this.farHills.shift();
      this.pushHill();
    }
  },
  draw() {
    // 宇宙のグラデーション
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#070918'); g.addColorStop(1, '#0d1030');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // 星
    for (const s of this.stars) {
      ctx.globalAlpha = s.bright;
      ctx.fillStyle = '#cfd8ff';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
    // 遠景シルエット（画面下部）
    ctx.fillStyle = '#141a3d';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i < this.farHills.length; i++) {
      ctx.lineTo(i * this.FAR_SEG - this.farOffset, H - this.farHills[i]);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }
};

/* ===== 4. 地形: 上下のハイトマップ。近景レイヤーを兼ねる ===== */
const Terrain = {
  SEG_W: 40,
  top: [], bottom: [], offset: 0,
  amp: 60,                 // 地形の最大振幅（ステージで増加）
  calmDown: false,         // ボス戦中は地形を平坦化する

  init(stage) {
    this.amp = clamp(50 + stage * 15, 50, 130);
    this.calmDown = false;
    this.offset = 0;
    this.top = []; this.bottom = [];
    const n = Math.ceil(W / this.SEG_W) + 2;
    for (let i = 0; i < n; i++) { this.top.push(20); this.bottom.push(35); }
  },
  /** 右端に新しいセグメントを追加（ランダムウォークで滑らかに変化） */
  pushSegment() {
    const lt = this.top[this.top.length - 1];
    const lb = this.bottom[this.bottom.length - 1];
    let nt, nb;
    if (this.calmDown) {
      // ボス戦: 徐々に平坦へ
      nt = Math.max(10, lt - 15);
      nb = Math.max(25, lb - 15);
    } else {
      nt = clamp(lt + rand(-28, 28), 10, this.amp);
      nb = clamp(lb + rand(-32, 32), 25, this.amp + 40);
      // 中央の通路を最低220px確保
      if (nt + nb > H - 220) nb = H - 220 - nt;
    }
    this.top.push(nt);
    this.bottom.push(nb);
    // 新セグメントに確率で砲台を設置（ボス戦中は設置しない）
    if (!this.calmDown && Math.random() < Game.turretChance && Game.state === 'playing') {
      const side = Math.random() < 0.5 ? 'top' : 'bottom';
      Game.enemies.push(new Turret(W + this.SEG_W, side));
    }
  },
  update(scroll) {
    this.offset += scroll;
    while (this.offset >= this.SEG_W) {
      this.offset -= this.SEG_W;
      this.top.shift(); this.bottom.shift();
      this.pushSegment();
    }
  },
  /** x座標における上側地形の高さ（線形補間） */
  topAt(x) {
    const u = (x + this.offset) / this.SEG_W;
    const i = clamp(Math.floor(u), 0, this.top.length - 2);
    return lerp(this.top[i], this.top[i + 1], u - i);
  },
  /** x座標における下側地形の高さ */
  bottomAt(x) {
    const u = (x + this.offset) / this.SEG_W;
    const i = clamp(Math.floor(u), 0, this.bottom.length - 2);
    return lerp(this.bottom[i], this.bottom[i + 1], u - i);
  },
  /** 円形エンティティが地形にめり込んでいるか */
  hits(e) {
    return e.y - e.r < this.topAt(e.x) || e.y + e.r > H - this.bottomAt(e.x);
  },
  draw() {
    const drawStrip = (heights, isTop) => {
      ctx.beginPath();
      ctx.moveTo(-this.SEG_W, isTop ? 0 : H);
      for (let i = 0; i < heights.length; i++) {
        const x = i * this.SEG_W - this.offset;
        ctx.lineTo(x, isTop ? heights[i] : H - heights[i]);
      }
      ctx.lineTo(W + this.SEG_W, isTop ? 0 : H);
      ctx.closePath();
      ctx.fillStyle = '#2a2f55';
      ctx.fill();
      ctx.strokeStyle = '#4a548f';
      ctx.lineWidth = 2;
      ctx.stroke();
    };
    drawStrip(this.top, true);
    drawStrip(this.bottom, false);
  }
};

/* ===== 5. エンティティ ===== */

/* --- パーティクル（爆発・破片） --- */
class Particle {
  constructor(x, y, color, speed, life) {
    const a = rand(0, Math.PI * 2);
    const v = rand(speed * 0.3, speed);
    this.x = x; this.y = y;
    this.vx = Math.cos(a) * v; this.vy = Math.sin(a) * v;
    this.life = this.maxLife = randInt(life * 0.6, life);
    this.color = color;
    this.size = rand(1.5, 4);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.96; this.vy *= 0.96;
    this.life--;
  }
  draw() {
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (this.life / this.maxLife), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}
/** 爆発生成のショートカット */
function explode(x, y, count, color, speed = 4, life = 35) {
  for (let i = 0; i < count; i++) Game.particles.push(new Particle(x, y, color, speed, life));
}

/* --- 自機弾 --- */
class PlayerBullet {
  /** kind: 'normal' | 'spread' | 'laser' */
  constructor(x, y, vx, vy, kind) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.kind = kind;
    this.r = kind === 'laser' ? 6 : 4;
    this.damage = kind === 'laser' ? 2 : 1;
    this.pierce = kind === 'laser';
    this.hitSet = this.pierce ? new Set() : null;  // 貫通弾の多重ヒット防止
    this.dead = false;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x > W + 50 || this.y < -20 || this.y > H + 20) this.dead = true;
    // レーザー以外は地形で消える
    if (!this.pierce && Terrain.hits(this)) {
      explode(this.x, this.y, 3, '#9ecbff', 2, 15);
      this.dead = true;
    }
  }
  draw() {
    if (this.kind === 'laser') {
      // 貫通レーザー: 横長のグラデーションビーム
      const g = ctx.createLinearGradient(this.x - 28, 0, this.x + 18, 0);
      g.addColorStop(0, 'rgba(255,80,220,0)');
      g.addColorStop(1, '#ff9df0');
      ctx.fillStyle = g;
      ctx.fillRect(this.x - 28, this.y - 2.5, 46, 5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(this.x + 8, this.y - 1, 10, 2);
    } else {
      ctx.fillStyle = this.kind === 'spread' ? '#ffd27a' : '#9ecbff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r - 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(this.x + 1, this.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

/* --- ミサイル: 斜め下に降下し、下地形に着くと地表を滑走（グラディウス式） --- */
class Missile {
  constructor(x, y, dir) {   // dir: 1=下向き, -1=上向き
    this.x = x; this.y = y;
    this.vx = 3.5; this.vy = 2.4 * dir;
    this.dir = dir;
    this.r = 5; this.damage = 3;
    this.crawling = false;   // 地表滑走モード
    this.dead = false;
  }
  update() {
    if (!this.crawling) {
      // 地形に接触したら滑走モードへ移行
      const surfY = this.dir === 1 ? H - Terrain.bottomAt(this.x) : Terrain.topAt(this.x);
      if ((this.dir === 1 && this.y + this.r >= surfY) ||
          (this.dir === -1 && this.y - this.r <= surfY)) {
        this.crawling = true;
        this.vx = 5.5; this.vy = 0;
      }
    }
    this.x += this.vx; this.y += this.vy;
    if (this.crawling) {
      // 地表に沿って高さを追従
      this.y = this.dir === 1 ? H - Terrain.bottomAt(this.x) - this.r
                              : Terrain.topAt(this.x) + this.r;
    }
    if (this.x > W + 30) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(Math.atan2(this.vy, this.vx));
    ctx.fillStyle = '#b8ffb0';
    ctx.fillRect(-6, -2, 12, 4);          // 本体
    ctx.fillStyle = '#ffae5e';
    ctx.beginPath();                       // 噴射炎
    ctx.moveTo(-6, 0); ctx.lineTo(-6 - rand(4, 9), -2); ctx.lineTo(-6 - rand(4, 9), 2);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

/* --- 敵弾 --- */
class EnemyBullet {
  constructor(x, y, vx, vy, color = '#ff8a8a') {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.r = 4; this.color = color;
    this.dead = false;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.dead = true;
    if (Terrain.hits(this)) this.dead = true;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(this.x, this.y, 1.8, 0, Math.PI * 2); ctx.fill();
  }
}
/** 自機を狙う弾を発射するヘルパー */
function aimedBullet(x, y, speed, spreadAngle = 0) {
  const p = Game.player;
  const base = Math.atan2(p.y - y, p.x - x) + spreadAngle;
  return new EnemyBullet(x, y, Math.cos(base) * speed, Math.sin(base) * speed);
}

/* --- パワーアップカプセル --- */
const CAPSULE_TYPES = {
  speed:   { label: 'S', color: '#5ecbff' },
  missile: { label: 'M', color: '#7dff7d' },
  spread:  { label: 'W', color: '#ffb74d' },
  laser:   { label: 'L', color: '#ff7df0' },
};
class Capsule {
  constructor(x, y) {
    const keys = Object.keys(CAPSULE_TYPES);
    this.type = keys[randInt(0, keys.length - 1)];
    this.x = x; this.y = y; this.r = 11;
    this.t = rand(0, 99);
    this.dead = false;
  }
  update() {
    this.t++;
    this.x -= 1.4;
    this.y += Math.sin(this.t * 0.06) * 0.6;   // ふわふわ漂う
    if (this.x < -20) this.dead = true;
  }
  draw() {
    const c = CAPSULE_TYPES[this.type];
    const pulse = 0.75 + Math.sin(this.t * 0.15) * 0.25;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.roundRect(-10, -10, 20, 20, 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#101325';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(c.label, 0, 1);
    ctx.restore();
  }
}

/* --- 敵基底クラス: HP・被弾フラッシュ・撃破処理を共通化 --- */
class Enemy {
  constructor(x, y, hp, r, score, dropRate) {
    this.x = x; this.y = y;
    this.hp = hp; this.r = r;
    this.score = score;
    this.dropRate = dropRate;   // カプセルドロップ率
    this.flash = 0;             // 被弾フラッシュの残フレーム
    this.dead = false;
  }
  damage(d) {
    this.hp -= d;
    this.flash = 4;
    if (this.hp <= 0) {
      this.dead = true;
      Game.addScore(this.score);
      explode(this.x, this.y, 14, '#ffb05e', 4, 35);
      explode(this.x, this.y, 8, '#ff6a4a', 3, 28);
      if (Math.random() < this.dropRate) Game.capsules.push(new Capsule(this.x, this.y));
    }
  }
  /** 被弾フラッシュ: 描画後に白い円を重ねる */
  drawFlash() {
    if (this.flash > 0) {
      ctx.globalAlpha = this.flash / 4 * 0.7;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      this.flash--;
    }
  }
}

/* --- 小型戦闘機: サイン波で編隊飛行 --- */
class SmallEnemy extends Enemy {
  constructor(baseY, amp, freq, phase) {
    super(W + 25, baseY, 1, 10, 100, 0.12);
    this.baseY = baseY; this.amp = amp; this.freq = freq; this.phase = phase;
    this.t = 0;
    this.vx = -(2.2 + Game.scrollSpeed * 0.5);
  }
  update() {
    this.t++;
    this.x += this.vx;
    this.y = this.baseY + Math.sin(this.t * this.freq + this.phase) * this.amp;
    if (this.x < -30) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // 左向きの赤いダート型
    ctx.fillStyle = '#ff5e5e';
    ctx.beginPath();
    ctx.moveTo(-12, 0); ctx.lineTo(8, -7); ctx.lineTo(4, 0); ctx.lineTo(8, 7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffd0d0';
    ctx.beginPath(); ctx.arc(-4, 0, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    this.drawFlash();
  }
}

/* --- 中型機: タフで自機狙い弾を撃つ --- */
class MediumEnemy extends Enemy {
  constructor(y) {
    super(W + 35, y, 10 + Game.stage * 2, 18, 500, 0.6);
    this.t = randInt(0, 40);
  }
  update() {
    this.t++;
    this.x -= 1.1;
    this.y += Math.sin(this.t * 0.025) * 0.8;
    // 画面内に入ったら定期発射（ステージ2以降は3WAY）
    if (this.x < W - 40 && this.t % Math.max(60, 100 - Game.stage * 10) === 0) {
      const spd = 2.6 + Game.stage * 0.3;
      Game.enemyBullets.push(aimedBullet(this.x - 15, this.y, spd));
      if (Game.stage >= 2) {
        Game.enemyBullets.push(aimedBullet(this.x - 15, this.y, spd, 0.3));
        Game.enemyBullets.push(aimedBullet(this.x - 15, this.y, spd, -0.3));
      }
    }
    if (this.x < -40) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // 紫の重装機体
    ctx.fillStyle = '#9b6fd8';
    ctx.beginPath();
    ctx.moveTo(-20, 0); ctx.lineTo(-8, -13); ctx.lineTo(16, -10);
    ctx.lineTo(20, 0); ctx.lineTo(16, 10); ctx.lineTo(-8, 13);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#5e3d96';
    ctx.fillRect(-4, -16, 14, 32);          // 装甲
    ctx.fillStyle = '#ffe08a';
    ctx.beginPath(); ctx.arc(-12, 0, 4, 0, Math.PI * 2); ctx.fill();  // 砲口
    ctx.restore();
    this.drawFlash();
  }
}

/* --- 砲台: 地形に設置され、砲身を自機に向けて発射 --- */
class Turret extends Enemy {
  constructor(x, side) {
    super(x, 0, 6 + Game.stage, 13, 300, 0.3);
    this.side = side;             // 'top' | 'bottom'
    this.t = randInt(0, 60);
    this.angle = side === 'top' ? Math.PI / 2 : -Math.PI / 2;
  }
  update() {
    this.t++;
    this.x -= Game.scrollSpeed;   // 地形と同速で流れる
    // 地形表面に吸着（高さは毎フレーム再計算）
    this.y = this.side === 'top' ? Terrain.topAt(this.x) + 8
                                 : H - Terrain.bottomAt(this.x) - 8;
    // 砲身を自機方向へゆっくり旋回
    const p = Game.player;
    if (p.alive) {
      const target = Math.atan2(p.y - this.y, p.x - this.x);
      let diff = target - this.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      this.angle += clamp(diff, -0.04, 0.04);
    }
    // 定期発射
    if (this.x < W - 20 && this.x > 40 && this.t % Math.max(70, 110 - Game.stage * 8) === 0) {
      const spd = 2.4 + Game.stage * 0.25;
      Game.enemyBullets.push(new EnemyBullet(
        this.x + Math.cos(this.angle) * 16, this.y + Math.sin(this.angle) * 16,
        Math.cos(this.angle) * spd, Math.sin(this.angle) * spd, '#ffd07a'));
    }
    if (this.x < -30) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // 台座（半円ドーム）
    ctx.fillStyle = '#6a7350';
    ctx.beginPath();
    ctx.arc(0, 0, 12, this.side === 'top' ? 0 : Math.PI, this.side === 'top' ? Math.PI : 0);
    ctx.closePath(); ctx.fill();
    // 砲身
    ctx.rotate(this.angle);
    ctx.fillStyle = '#9aa86e';
    ctx.fillRect(0, -3, 17, 6);
    ctx.restore();
    this.drawFlash();
  }
}

/* --- ボス: HPバー・3フェーズの攻撃パターン・撃破演出 --- */
class Boss extends Enemy {
  constructor() {
    const hp = 250 + Game.stage * 120;
    super(W + 130, H / 2, hp, 52, 10000, 0);
    this.maxHp = hp;
    this.t = 0;
    this.entering = true;          // 画面右へスライドイン
    this.dying = false;            // 撃破演出中
    this.deathTimer = 0;
    this.vy = 1.2;
  }
  /** 現在フェーズ: HP残量で 1→2→3 と推移 */
  phase() {
    const ratio = this.hp / this.maxHp;
    return ratio > 0.6 ? 1 : ratio > 0.3 ? 2 : 3;
  }
  damage(d) {
    if (this.entering || this.dying) return;   // 登場中・撃破演出中は無敵
    this.hp -= d;
    this.flash = 4;
    if (this.hp <= 0) {
      this.hp = 0;
      this.dying = true;
      this.deathTimer = 130;
      Game.enemyBullets = [];      // 弾を消して演出に集中
    }
  }
  update() {
    this.t++;
    if (this.entering) {
      this.x -= 1.5;
      if (this.x <= W - 130) this.entering = false;
      return;
    }
    if (this.dying) {
      // 撃破演出: 連続爆発 → 大フラッシュ → ステージクリア
      this.deathTimer--;
      if (this.deathTimer % 9 === 0) {
        explode(this.x + rand(-50, 50), this.y + rand(-50, 50), 16, '#ffb05e', 5, 40);
        explode(this.x + rand(-50, 50), this.y + rand(-50, 50), 8, '#fff', 3, 25);
        Game.shake = 8;
      }
      if (this.deathTimer <= 0) {
        this.dead = true;
        Game.addScore(this.score + Game.stage * 5000);
        explode(this.x, this.y, 60, '#ffd27a', 8, 60);
        explode(this.x, this.y, 40, '#ff6a4a', 6, 50);
        Game.flash = 25;
        Game.shake = 20;
        Game.onBossDefeated();
      }
      return;
    }
    const ph = this.phase();
    // 上下移動（フェーズが進むほど速い）
    this.y += this.vy * (1 + ph * 0.4);
    const topLim = Terrain.topAt(this.x) + this.r + 15;
    const botLim = H - Terrain.bottomAt(this.x) - this.r - 15;
    if (this.y < topLim || this.y > botLim) this.vy *= -1;
    this.y = clamp(this.y, topLim, botLim);

    const spd = 2.6 + Game.stage * 0.3;
    if (ph === 1) {
      // フェーズ1: 自機狙い3WAY
      if (this.t % 55 === 0) {
        for (const a of [-0.25, 0, 0.25])
          Game.enemyBullets.push(aimedBullet(this.x - 45, this.y, spd, a));
      }
    } else if (ph === 2) {
      // フェーズ2: 全方位リング + 自機狙い
      if (this.t % 80 === 0) {
        for (let i = 0; i < 12; i++) {
          const a = (i / 12) * Math.PI * 2;
          Game.enemyBullets.push(new EnemyBullet(
            this.x, this.y, Math.cos(a) * spd * 0.8, Math.sin(a) * spd * 0.8, '#c890ff'));
        }
      }
      if (this.t % 45 === 0)
        Game.enemyBullets.push(aimedBullet(this.x - 45, this.y, spd * 1.2));
    } else {
      // フェーズ3: 渦巻き弾幕 + 5WAY
      if (this.t % 7 === 0) {
        const a = this.t * 0.25;
        Game.enemyBullets.push(new EnemyBullet(
          this.x, this.y, Math.cos(a) * spd * 0.85, Math.sin(a) * spd * 0.85, '#ff7df0'));
      }
      if (this.t % 70 === 0) {
        for (const a of [-0.5, -0.25, 0, 0.25, 0.5])
          Game.enemyBullets.push(aimedBullet(this.x - 45, this.y, spd * 1.1, a));
      }
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // 撃破演出中・フェーズ3は明滅
    if (this.dying && this.t % 6 < 3) ctx.globalAlpha = 0.6;
    const danger = this.phase() === 3 && !this.dying;
    // 後部スラスター
    ctx.fillStyle = '#3d4470';
    ctx.fillRect(30, -58, 28, 116);
    // 本体（巨大な左向き艦体）
    ctx.fillStyle = danger && this.t % 20 < 10 ? '#8a4458' : '#566097';
    ctx.beginPath();
    ctx.moveTo(-62, 0);
    ctx.lineTo(-30, -42); ctx.lineTo(34, -52); ctx.lineTo(44, -20);
    ctx.lineTo(44, 20); ctx.lineTo(34, 52); ctx.lineTo(-30, 42);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8e9be0'; ctx.lineWidth = 2; ctx.stroke();
    // 上下の砲塔
    ctx.fillStyle = '#39406e';
    ctx.fillRect(-18, -52, 26, 16);
    ctx.fillRect(-18, 36, 26, 16);
    // コア（弱点っぽい発光部）
    const coreG = ctx.createRadialGradient(-30, 0, 2, -30, 0, 16);
    coreG.addColorStop(0, '#fff');
    coreG.addColorStop(0.4, danger ? '#ff5e7a' : '#7adfff');
    coreG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = coreG;
    ctx.beginPath(); ctx.arc(-30, 0, 16, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    this.drawFlash();
  }
  /** ボスHPバー（HUD直下に表示） */
  drawHpBar() {
    if (this.entering) return;
    const bw = 500, bx = (W - bw) / 2, by = HUD_H + 8;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx - 2, by - 2, bw + 4, 14);
    const ratio = this.hp / this.maxHp;
    ctx.fillStyle = ratio > 0.6 ? '#ff5e5e' : ratio > 0.3 ? '#ff9e3d' : '#ffd23d';
    ctx.fillRect(bx, by, bw * ratio, 10);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx - 2, by - 2, bw + 4, 14);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', W / 2, by - 5);
  }
}

/* --- 自機 --- */
class Player {
  constructor() {
    this.x = 80; this.y = H / 2;
    this.r = 9;
    this.lives = 3;
    this.alive = true;
    this.invincible = 120;     // 開始直後の無敵時間
    this.respawnTimer = 0;
    // パワーアップ状態
    this.speedLv = 0;          // 0〜4
    this.weapon = 'normal';    // 'normal' | 'spread' | 'laser'
    this.missileLv = 0;        // 0:なし 1:下 2:上下
    this.shotCd = 0; this.missileCd = 0;
    this.t = 0;
  }
  get moveSpeed() { return 3 + this.speedLv * 0.7; }

  update() {
    this.t++;
    if (!this.alive) {
      // 撃墜後のリスポーン待ち
      if (--this.respawnTimer <= 0 && this.lives >= 0) {
        this.alive = true;
        this.x = 80; this.y = H / 2;
        this.invincible = 150;
      }
      return;
    }
    if (this.invincible > 0) this.invincible--;
    // 移動（地形・画面端でクランプ）
    if (Input.down['arrowup'])    this.y -= this.moveSpeed;
    if (Input.down['arrowdown'])  this.y += this.moveSpeed;
    if (Input.down['arrowleft'])  this.x -= this.moveSpeed;
    if (Input.down['arrowright']) this.x += this.moveSpeed;
    this.x = clamp(this.x, 20, W - 20);
    this.y = clamp(this.y, HUD_H + 14, H - 14);

    // ショット（Z: 押しっぱなしで連射）
    if (this.shotCd > 0) this.shotCd--;
    if (Input.down['z'] && this.shotCd <= 0) this.fire();
    // ミサイル（X）
    if (this.missileCd > 0) this.missileCd--;
    if (Input.down['x'] && this.missileLv > 0 && this.missileCd <= 0) {
      Game.playerBullets.push(new Missile(this.x, this.y + 6, 1));
      if (this.missileLv >= 2) Game.playerBullets.push(new Missile(this.x, this.y - 6, -1));
      this.missileCd = 35;
    }
    // 地形衝突
    if (this.invincible <= 0 && Terrain.hits(this)) this.hit();
  }
  fire() {
    const b = Game.playerBullets;
    if (this.weapon === 'spread') {
      // 拡散弾: 3方向
      for (const a of [-0.26, 0, 0.26])
        b.push(new PlayerBullet(this.x + 14, this.y, Math.cos(a) * 8, Math.sin(a) * 8, 'spread'));
      this.shotCd = 12;
    } else if (this.weapon === 'laser') {
      // レーザー: 高速・貫通
      b.push(new PlayerBullet(this.x + 18, this.y, 14, 0, 'laser'));
      this.shotCd = 9;
    } else {
      // 通常弾: 2連射
      b.push(new PlayerBullet(this.x + 14, this.y - 3, 9, 0, 'normal'));
      b.push(new PlayerBullet(this.x + 14, this.y + 3, 9, 0, 'normal'));
      this.shotCd = 8;
    }
  }
  /** 被弾処理 */
  hit() {
    if (!this.alive || this.invincible > 0) return;
    this.lives--;
    this.alive = false;
    this.respawnTimer = 60;
    explode(this.x, this.y, 24, '#9ecbff', 5, 45);
    explode(this.x, this.y, 14, '#fff', 4, 30);
    Game.shake = 12;
    Game.redFlash = 18;
    if (this.lives < 0) Game.onGameOver();
  }
  /** カプセル取得 */
  pickUp(type) {
    switch (type) {
      case 'speed':
        if (this.speedLv < 4) this.speedLv++;
        else Game.addScore(500);          // 最大時はボーナス点
        break;
      case 'missile':
        if (this.missileLv < 2) this.missileLv++;
        else Game.addScore(500);
        break;
      case 'spread': this.weapon = 'spread'; break;
      case 'laser':  this.weapon = 'laser';  break;
    }
    explode(this.x, this.y, 8, CAPSULE_TYPES[type].color, 2.5, 22);
  }
  draw() {
    if (!this.alive) return;
    // 無敵中は点滅
    if (this.invincible > 0 && this.invincible % 8 < 4) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    // エンジン噴射（揺らぎ）
    const fl = rand(8, 16);
    ctx.fillStyle = '#ffae5e';
    ctx.beginPath();
    ctx.moveTo(-13, -3); ctx.lineTo(-13 - fl, 0); ctx.lineTo(-13, 3);
    ctx.closePath(); ctx.fill();
    // 機体
    const g = ctx.createLinearGradient(0, -10, 0, 10);
    g.addColorStop(0, '#cfe8ff'); g.addColorStop(0.5, '#7cb7e8'); g.addColorStop(1, '#3d6ea8');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(17, 0); ctx.lineTo(-5, -8); ctx.lineTo(-13, -5);
    ctx.lineTo(-9, 0); ctx.lineTo(-13, 5); ctx.lineTo(-5, 8);
    ctx.closePath(); ctx.fill();
    // ウイング
    ctx.fillStyle = '#4a7fbf';
    ctx.beginPath();
    ctx.moveTo(-2, -7); ctx.lineTo(2, -13); ctx.lineTo(6, -7); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-2, 7); ctx.lineTo(2, 13); ctx.lineTo(6, 7); ctx.closePath(); ctx.fill();
    // コックピット
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(5, -1.5, 2.5, 0, Math.PI * 2); ctx.fill();
    // ミサイルポッド装備時は機体下に表示（パワー状態の常時可視化）
    if (this.missileLv >= 1) { ctx.fillStyle = '#7dff7d'; ctx.fillRect(-6, 8, 9, 3); }
    if (this.missileLv >= 2) { ctx.fillStyle = '#7dff7d'; ctx.fillRect(-6, -11, 9, 3); }
    ctx.restore();
  }
}

/* ===== 6. スポナー: ステージ進行に応じて敵を出現させる ===== */
const Spawner = {
  t: 0,
  pending: [],         // {frame, fn} 遅延スポーン予約（編隊の時間差出現に使用）

  reset() { this.t = 0; this.pending = []; },

  update() {
    if (Game.boss) return;   // ボス戦中は通常敵を出さない
    this.t++;
    // 予約済みスポーンの実行
    this.pending = this.pending.filter(p => {
      if (this.t >= p.frame) { p.fn(); return false; }
      return true;
    });
    // 小型機編隊: 間隔はステージで短縮
    const smallInterval = Math.max(90, 170 - Game.stage * 20);
    if (this.t % smallInterval === 0) this.queueFormation();
    // 中型機
    const medInterval = Math.max(240, 420 - Game.stage * 40);
    if (this.t % medInterval === 0) {
      Game.enemies.push(new MediumEnemy(rand(HUD_H + 80, H - 100)));
    }
    // ボス出現（ステージ開始から約45秒）
    if (this.t === 2700) Game.startBossBattle();
  },
  /** 小型機5機を時間差で同一波形パターンに乗せる */
  queueFormation() {
    const baseY = rand(HUD_H + 90, H - 110);
    const amp = rand(35, 85);
    const freq = rand(0.03, 0.06);
    for (let k = 0; k < 5; k++) {
      this.pending.push({
        frame: this.t + k * 14,
        fn: () => Game.enemies.push(new SmallEnemy(baseY, amp, freq, k * 0.5))
      });
    }
  }
};

/* ===== 7. ゲーム本体 ===== */
const Game = {
  state: 'title',    // 'title' | 'playing' | 'clear' | 'gameover'
  paused: false,
  stage: 1,
  score: 0,
  hiScore: Number(localStorage.getItem('cosmicStrikerHiScore') || 0),
  scrollSpeed: 1.5,
  stageTime: 0,
  turretChance: 0.18,

  player: null,
  playerBullets: [], enemyBullets: [],
  enemies: [], capsules: [], particles: [],
  boss: null,

  // 画面演出
  shake: 0,        // 画面振動
  flash: 0,        // 白フラッシュ（ボス撃破）
  redFlash: 0,     // 赤フラッシュ（被弾）

  init() {
    Input.init();
    TouchControls.init();
    Background.init();
    Terrain.init(1);
    requestAnimationFrame(loop);
  },

  /** 新規ゲーム開始 */
  startGame() {
    this.stage = 1;
    this.score = 0;
    this.player = new Player();
    this.startStage();
    this.state = 'playing';
  },
  /** ステージ初期化（2面以降はパワー・スコア・残機を引き継ぐ） */
  startStage() {
    this.playerBullets = []; this.enemyBullets = [];
    this.enemies = []; this.capsules = []; this.particles = [];
    this.boss = null;
    this.stageTime = 0;
    this.scrollSpeed = 1.5 + (this.stage - 1) * 0.3;
    this.turretChance = clamp(0.15 + this.stage * 0.04, 0, 0.4);
    Terrain.init(this.stage);
    Background.init();
    Spawner.reset();
    this.player.x = 80; this.player.y = H / 2;
    this.player.invincible = 120;
  },

  startBossBattle() {
    Terrain.calmDown = true;       // 地形を平坦化してボス戦の空間を確保
    this.boss = new Boss();
    this.enemies.push(this.boss);
  },
  onBossDefeated() {
    this.boss = null;
    this.state = 'clear';
  },
  onGameOver() {
    this.state = 'gameover';
    if (this.score > this.hiScore) {
      this.hiScore = this.score;
      localStorage.setItem('cosmicStrikerHiScore', String(this.hiScore));
    }
  },
  addScore(v) {
    this.score += v;
    if (this.score > this.hiScore) this.hiScore = this.score;
  },

  update() {
    // --- 状態別の入力処理 ---
    if (this.state === 'title') {
      Background.update(1.2);      // タイトルでもデモスクロール
      Terrain.update(1.2);
      if (Input.pressed['z'] || Input.pressed['enter']) this.startGame();
      return;
    }
    if (this.state === 'gameover') {
      for (const p of this.particles) p.update();
      this.particles = this.particles.filter(p => p.life > 0);
      if (Input.pressed['z'] || Input.pressed['enter']) this.state = 'title';
      return;
    }
    if (this.state === 'clear') {
      Background.update(this.scrollSpeed);
      Terrain.update(this.scrollSpeed);
      for (const p of this.particles) p.update();
      this.particles = this.particles.filter(p => p.life > 0);
      if (this.flash > 0) this.flash--;
      if (this.shake > 0) this.shake--;
      if (Input.pressed['z'] || Input.pressed['enter']) {
        this.stage++;
        this.startStage();
        this.state = 'playing';
      }
      return;
    }
    // --- playing ---
    if (Input.pressed['p']) this.paused = !this.paused;
    if (this.paused) return;

    this.stageTime++;
    // スクロール速度は時間とともに漸増（上限あり）
    this.scrollSpeed = Math.min(
      1.5 + (this.stage - 1) * 0.3 + this.stageTime * 0.00012,
      4.0);

    Background.update(this.scrollSpeed);
    Terrain.update(this.scrollSpeed);
    Spawner.update();
    this.player.update();

    for (const b of this.playerBullets) b.update();
    for (const b of this.enemyBullets) b.update();
    for (const e of this.enemies) e.update();
    for (const c of this.capsules) c.update();
    for (const p of this.particles) p.update();

    this.checkCollisions();

    // 死亡エンティティの除去
    this.playerBullets = this.playerBullets.filter(b => !b.dead);
    this.enemyBullets = this.enemyBullets.filter(b => !b.dead);
    this.enemies = this.enemies.filter(e => !e.dead);
    this.capsules = this.capsules.filter(c => !c.dead);
    this.particles = this.particles.filter(p => p.life > 0);

    if (this.shake > 0) this.shake--;
    if (this.flash > 0) this.flash--;
    if (this.redFlash > 0) this.redFlash--;
  },

  checkCollisions() {
    const pl = this.player;
    // 自機弾 vs 敵
    for (const b of this.playerBullets) {
      for (const e of this.enemies) {
        if (e.dead || (b.dead && !b.pierce)) continue;
        if (b.hitSet && b.hitSet.has(e)) continue;   // 貫通弾の多重ヒット防止
        if (hitCircle(b, e)) {
          e.damage(b.damage);
          if (b.pierce) b.hitSet.add(e);
          else { b.dead = true; explode(b.x, b.y, 3, '#fff', 2, 12); }
        }
      }
    }
    if (!pl.alive || pl.invincible > 0) {
      // 無敵中でもカプセルは取れる
      this.pickupCapsules();
      return;
    }
    // 敵弾 vs 自機
    for (const b of this.enemyBullets) {
      if (hitCircle(b, pl)) { b.dead = true; pl.hit(); return; }
    }
    // 敵本体 vs 自機（体当たり）
    for (const e of this.enemies) {
      if (hitCircle(e, pl)) { pl.hit(); return; }
    }
    this.pickupCapsules();
  },
  pickupCapsules() {
    const pl = this.player;
    if (!pl.alive) return;
    for (const c of this.capsules) {
      if (hitCircle(c, pl)) { c.dead = true; pl.pickUp(c.type); }
    }
  },

  draw() {
    ctx.save();
    // 画面振動
    if (this.shake > 0) {
      ctx.translate(rand(-this.shake, this.shake) * 0.6, rand(-this.shake, this.shake) * 0.6);
    }
    Background.draw();
    Terrain.draw();

    if (this.state === 'title') {
      ctx.restore();
      drawTitleScreen();
      return;
    }

    for (const c of this.capsules) c.draw();
    for (const e of this.enemies) e.draw();
    this.player.draw();
    for (const b of this.playerBullets) b.draw();
    for (const b of this.enemyBullets) b.draw();
    for (const p of this.particles) p.draw();

    if (this.boss) this.boss.drawHpBar();
    ctx.restore();

    // 被弾の赤フラッシュ（ビネット風）
    if (this.redFlash > 0) {
      ctx.fillStyle = `rgba(255,40,40,${this.redFlash / 18 * 0.35})`;
      ctx.fillRect(0, 0, W, H);
    }
    // ボス撃破の白フラッシュ
    if (this.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.flash / 25})`;
      ctx.fillRect(0, 0, W, H);
    }

    drawHUD();
    if (this.state === 'clear') drawClearScreen();
    if (this.state === 'gameover') drawGameOverScreen();
    if (this.paused && this.state === 'playing') drawPauseOverlay();
  }
};

/* ===== 8. HUD / 各種画面 ===== */
function drawHUD() {
  // 上部バー
  ctx.fillStyle = 'rgba(8,10,25,0.85)';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = '#2a3260';
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(W, HUD_H); ctx.stroke();

  ctx.font = 'bold 14px monospace';
  ctx.textBaseline = 'middle';
  // スコア
  ctx.textAlign = 'left';
  ctx.fillStyle = '#9ecbff';
  ctx.fillText('SCORE', 14, 11);
  ctx.fillStyle = '#fff';
  ctx.fillText(String(Game.score).padStart(8, '0'), 14, 25);
  // ハイスコア
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd27a';
  ctx.fillText('HI', W / 2 - 60, 11);
  ctx.fillStyle = '#fff';
  ctx.fillText(String(Game.hiScore).padStart(8, '0'), W / 2 - 60, 25);
  // ステージ
  ctx.fillStyle = '#9ecbff';
  ctx.fillText(`STAGE ${Game.stage}`, W / 2 + 80, 18);

  // 残機（小さい自機アイコン）
  const lives = Math.max(0, Game.player ? Game.player.lives : 0);
  for (let i = 0; i < lives; i++) {
    const lx = W - 150 + i * 26, ly = 17;
    ctx.fillStyle = '#7cb7e8';
    ctx.beginPath();
    ctx.moveTo(lx + 9, ly); ctx.lineTo(lx - 5, ly - 5); ctx.lineTo(lx - 5, ly + 5);
    ctx.closePath(); ctx.fill();
  }

  // パワーアップ状態（右端）
  if (Game.player) {
    const p = Game.player;
    ctx.textAlign = 'right';
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = '#5ecbff';
    ctx.fillText(`SPD ${p.speedLv}`, W - 14, 9);
    ctx.fillStyle = p.missileLv > 0 ? '#7dff7d' : '#3a4366';
    ctx.fillText(`MSL ${p.missileLv}`, W - 14, 20);
    ctx.fillStyle = p.weapon === 'laser' ? '#ff7df0' : p.weapon === 'spread' ? '#ffb74d' : '#9ecbff';
    ctx.fillText(p.weapon.toUpperCase(), W - 14, 31);
  }
}

function drawCenteredPanel(alpha = 0.65) {
  ctx.fillStyle = `rgba(5,6,15,${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

function drawTitleScreen() {
  drawCenteredPanel(0.45);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // タイトルロゴ
  ctx.font = 'bold 52px monospace';
  const g = ctx.createLinearGradient(0, 150, 0, 200);
  g.addColorStop(0, '#9ecbff'); g.addColorStop(1, '#4a7fbf');
  ctx.fillStyle = g;
  ctx.fillText('COSMIC STRIKER', W / 2, 160);
  ctx.font = '16px monospace';
  ctx.fillStyle = '#7a86c0';
  ctx.fillText('- 横スクロールシューティング -', W / 2, 200);
  // 点滅スタート表示
  if (Math.floor(performance.now() / 500) % 2 === 0) {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS Z TO START', W / 2, 280);
  }
  // 操作説明
  ctx.font = '13px monospace';
  ctx.fillStyle = '#9aa3cc';
  ctx.fillText('矢印キー: 移動   Z: ショット   X: ミサイル   P: ポーズ', W / 2, 350);
  ctx.fillText('カプセル  S:スピード  M:ミサイル  W:拡散弾  L:レーザー', W / 2, 375);
  ctx.fillStyle = '#ffd27a';
  ctx.fillText(`HI-SCORE ${String(Game.hiScore).padStart(8, '0')}`, W / 2, 430);
}

function drawClearScreen() {
  drawCenteredPanel(0.55);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 42px monospace';
  ctx.fillStyle = '#ffd27a';
  ctx.fillText(`STAGE ${Game.stage} CLEAR!`, W / 2, 190);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`BONUS  ${10000 + Game.stage * 5000}`, W / 2, 250);
  if (Math.floor(performance.now() / 500) % 2 === 0) {
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#9ecbff';
    ctx.fillText(`PRESS Z FOR STAGE ${Game.stage + 1}`, W / 2, 320);
  }
}

function drawGameOverScreen() {
  drawCenteredPanel(0.6);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = '#ff5e5e';
  ctx.fillText('GAME OVER', W / 2, 190);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`SCORE  ${String(Game.score).padStart(8, '0')}`, W / 2, 255);
  if (Game.score >= Game.hiScore && Game.score > 0) {
    ctx.fillStyle = '#ffd27a';
    ctx.fillText('★ NEW RECORD! ★', W / 2, 290);
  }
  if (Math.floor(performance.now() / 500) % 2 === 0) {
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#9ecbff';
    ctx.fillText('PRESS Z TO TITLE', W / 2, 350);
  }
}

function drawPauseOverlay() {
  drawCenteredPanel(0.5);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 36px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('PAUSE', W / 2, H / 2);
}

/* ===== メインループ: rAF + 累積時間で更新を1/60秒固定 ===== */
const STEP = 1000 / 60;
let lastTime = 0, acc = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) lastTime = ts;
  acc += Math.min(ts - lastTime, 100);   // タブ非アクティブ復帰時の暴走防止
  lastTime = ts;
  while (acc >= STEP) {
    Game.update();
    Input.endFrame();
    acc -= STEP;
  }
  Game.draw();
}

Game.init();
</script>
